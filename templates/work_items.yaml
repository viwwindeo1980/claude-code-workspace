# templates/work_items.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Declarative hierarchy template: Epic → Feature → User Story
#
# Source: Azure DevOps — DCOD-Upgrade / Upgrade Operations
#         Epic 36543 "{client_name} Upgrade {fiscal_year}"
#
# The script reads this file on every run and creates the work items in ADO.
# Edit this file to change what gets created each sprint.
#
# ── Variable substitution ────────────────────────────────────────────────────
# Any {variable_name} placeholder in a string value is replaced at runtime.
# Values come from two sources (pipeline env var wins over yaml default):
#
#   yaml default        pipeline env var    example
#   ──────────────────  ──────────────────  ─────────────────────
#   client_name: ORES   CLIENT_NAME         CLIENT_NAME=Acme
#   fiscal_year: FY25   FISCAL_YEAR         FISCAL_YEAR=FY26
#
# Field reference:
#   title               → System.Title             (required)
#   description         → System.Description
#   tags                → System.Tags              (comma-separated)
#   area_path           → System.AreaPath          (omit = project default area)
#   story_points        → Microsoft.VSTS.Scheduling.StoryPoints  (User Stories only)
#   priority            → Microsoft.VSTS.Common.Priority         (1=Critical … 4=Low)
#   acceptance_criteria → Microsoft.VSTS.Common.AcceptanceCriteria (User Stories only)
#
# ── area_path note ───────────────────────────────────────────────────────────
# area_path fields are intentionally omitted below so all work items are
# created under the project's default area.  Once the area path hierarchy
# exists in ADO (Project Settings → Boards → Area), add area_path: entries
# to individual Epics / Features, e.g.:
#   area_path: "Upgrade Operations\\Policy and Billing Upgrade\\ORES FY25 Upgrade"
# ─────────────────────────────────────────────────────────────────────────────

# ── Pipeline-overridable variables ───────────────────────────────────────────
# Change these defaults here, or pass CLIENT_NAME / FISCAL_YEAR as pipeline
# variables to override without editing this file.
variables:
  client_name: "ORES"
  fiscal_year: "FY25"

sprints:
  name_prefix: "{client_name} Sprint"   # Final name becomes e.g. "ORES Sprint 2026-03-04"
  duration_days: 15                     # Must match the pipeline schedule period

epics:

  # ── Epic ────────────────────────────────────────────────────────────────────
  - title: "{client_name} Upgrade {fiscal_year}"
    description: >
      End-to-end upgrade of the {client_name} platform for {fiscal_year}, covering
      planning, analysis, upgrade execution, dry runs, testing, deployment,
      client regression validation, and handover to support.
    tags: "{client_name}, {fiscal_year}, upgrade"
    priority: 2

    features:

      # ── Feature: Planning ────────────────────────────────────────────────────
      - title: "{client_name} {fiscal_year} - Planning"
        description: >
          Pre-upgrade planning activities including client calls, ODW setup,
          schema compare, pipeline runs, and walkthrough preparation.
        user_stories:

          - title: "Client calls"
            description: >
              Conduct planning and alignment calls with the client to confirm
              upgrade scope, timelines, and responsibilities.
            priority: 2

          - title: "Automation Pipeline run for local ODWs"
            description: >
              Execute the automation pipeline against local ODW environments to
              validate baseline behaviour before upgrade activities begin.
            priority: 2

          - title: "Internal meetings"
            description: >
              Hold internal team meetings to align on upgrade plan, task
              ownership, and risk items.
            priority: 2

          - title: "Pre-Upgrade Walkthrough session"
            description: >
              Conduct a formal pre-upgrade walkthrough session with all
              stakeholders to review the upgrade plan and sign off on readiness.
            priority: 2

          - title: "Producer - Compare Pre Upgrade and Old Base folder structure and files"
            description: >
              Compare the Producer pre-upgrade folder structure and file contents
              against the old base to identify delta items before upgrade.
            priority: 2

          - title: "Preupgrade/weekly walkthrough Deck Preparation"
            description: >
              Prepare the pre-upgrade and weekly walkthrough presentation deck
              for stakeholder review.
            priority: 2

          - title: "ODW setup"
            description: >
              Provision and configure the Online Development Workspaces (ODWs)
              required for the upgrade process.
            priority: 2

          - title: "Schema Compare Report"
            description: >
              Generate and review the database schema compare report to identify
              structural changes between the base and client versions.
            priority: 2

      # ── Feature: Analysis ───────────────────────────────────────────────────
      - title: "{client_name} {fiscal_year} - Analysis"
        description: >
          Analysis phase covering manuscripts, skins, configurations, database,
          DDA report, and pre-upgrade server validation across Policy, Billing,
          and Producer modules.
        user_stories:

          - title: "Policy Manuscripts Analysis"
            description: >
              Analyse Policy manuscripts to identify customisations, overrides,
              and conflicts that must be resolved during the upgrade.
            priority: 2

          - title: "Billing Manuscripts Analysis"
            description: >
              Analyse Billing manuscripts to identify customisations, overrides,
              and conflicts that must be resolved during the upgrade.
            priority: 2

          - title: "Policy Skins Analysis"
            description: >
              Analyse Policy skin files to document client-specific UI
              customisations and assess upgrade impact.
            priority: 2

          - title: "Billing Skins Analysis"
            description: >
              Analyse Billing skin files to document client-specific UI
              customisations and assess upgrade impact.
            priority: 2

          - title: "Policy Configuration Analysis"
            description: >
              Review Policy configuration settings and assess changes required
              to align the client environment with the target upgrade version.
            priority: 2

          - title: "Billing Configuration Analysis"
            description: >
              Review Billing configuration settings and assess changes required
              to align the client environment with the target upgrade version.
            priority: 2

          - title: "Producer - Policy Manuscript Analysis"
            description: >
              Analyse Producer-side Policy manuscripts for customisations and
              merge conflicts ahead of upgrade execution.
            priority: 2

          - title: "Base repo Cleanup"
            description: >
              Clean up the base repository to remove stale branches, obsolete
              artifacts, and unneeded configuration before upgrade begins.
            priority: 2

          - title: "DDA Report Preparation"
            description: >
              Prepare the Detailed Design Analysis (DDA) report summarising
              findings from the analysis phase for client review and sign-off.
            priority: 2

          - title: "Validate PreUpgrade Server"
            description: >
              Validate that the pre-upgrade server environment is correctly
              configured and stable before commencing upgrade activities.
            priority: 2

          - title: "Database analysis"
            description: >
              Perform a comprehensive database analysis to assess schema
              differences, stored procedures, and data migration requirements.
            priority: 2

      # ── Feature: POC ────────────────────────────────────────────────────────
      - title: "POC : Pre-upgrade & Upgrade Activities"
        description: >
          Proof-of-concept activities covering pre-upgrade preparation, DG Tool
          report execution, and the analysis phase for the Producer module.
        user_stories:

          - title: "Pre-Upgrade Activities"
            description: >
              Execute all pre-upgrade preparation tasks on the POC environment
              including environment setup and baseline validation.
            priority: 2

          - title: "Prep work to Run DG Tool Report"
            description: >
              Perform preparatory work required to execute the DG Tool report
              against the POC environment.
            priority: 2

          - title: "Analysis Phase"
            description: >
              Conduct the full analysis phase for the POC upgrade including
              manuscript, skin, and configuration review for the Producer module.
            priority: 2

      # ── Feature: Upgrade and Local Sanity ───────────────────────────────────
      - title: "{client_name} {fiscal_year} - Upgrade and Local Sanity"
        description: >
          Core upgrade execution covering folder merges, manuscript and skin
          upgrades, configuration upgrades, delta merge, Producer code integration,
          and local sanity testing across Policy, Billing, and Producer modules.
        user_stories:

          - title: "Client Repo Check-in"
            description: >
              Check in all client repository changes required to initiate the
              upgrade, ensuring source control is consistent before merging begins.
            priority: 2

          - title: "Policy Parent Folder Merge"
            description: >
              Merge the Policy parent folder from the base upgrade version into
              the client repository, resolving all conflicts.
            priority: 2

          - title: "Billing Parent Folder Merge"
            description: >
              Merge the Billing parent folder from the base upgrade version into
              the client repository, resolving all conflicts.
            priority: 2

          - title: "Policy Manuscripts upgrade"
            description: >
              Apply all Policy manuscript changes identified during analysis,
              merging base upgrades with client customisations.
            priority: 2

          - title: "Billing Manuscripts upgrade"
            description: >
              Apply all Billing manuscript changes identified during analysis,
              merging base upgrades with client customisations.
            priority: 2

          - title: "Policy Configurations Upgrade"
            description: >
              Upgrade Policy configuration files to align with the target version
              while preserving client-specific settings.
            priority: 2

          - title: "Billing Configurations Upgrade"
            description: >
              Upgrade Billing configuration files to align with the target version
              while preserving client-specific settings.
            priority: 2

          - title: "Policy Skins Upgrade"
            description: >
              Upgrade Policy skin files, merging base changes with client UI
              customisations and validating rendering post-merge.
            priority: 2

          - title: "Billing Skins Upgrade"
            description: >
              Upgrade Billing skin files, merging base changes with client UI
              customisations and validating rendering post-merge.
            priority: 2

          - title: "Delta Merge"
            description: >
              Execute the delta merge pass to incorporate incremental base changes
              released after the initial upgrade snapshot was taken.
            priority: 2

          - title: "Producer 1.x on Upgrade Lab"
            description: >
              Deploy and validate Producer 1.x code on the upgrade lab environment
              to confirm compatibility with the upgraded platform.
            priority: 2

          - title: "Producer 2.x Code Merge"
            description: >
              Merge Producer 2.x customisations into the upgraded codebase and
              verify functional parity on the upgrade lab.
            priority: 2

          - title: "Analysis Feedback"
            description: >
              Incorporate feedback received from the client analysis review into
              the upgrade deliverables before local sanity testing.
            priority: 2

          - title: "Setup Preupgrade ODW"
            description: >
              Set up the pre-upgrade ODW snapshot environment required for
              side-by-side comparison during sanity testing.
            priority: 2

          - title: "ODW Triage"
            description: >
              Triage ODW issues identified during local testing and resolve or
              escalate defects before dry run.
            priority: 2

          - title: "Adhoc Scenario Test on Producer 2x code"
            description: >
              Run ad-hoc scenario tests against the Producer 2.x merged code to
              validate key business workflows before formal dry run.
            priority: 2

          - title: "Policy Sanity"
            description: >
              Execute the Policy sanity test suite on the upgraded local
              environment to confirm core policy workflows are functioning.
            priority: 2

          - title: "Billing Sanity"
            description: >
              Execute the Billing sanity test suite on the upgraded local
              environment to confirm core billing workflows are functioning.
            priority: 2

      # ── Feature: Dry Run ────────────────────────────────────────────────────
      - title: "{client_name} {fiscal_year} Dry Run"
        description: >
          Dry run execution across all modules (Policy, Billing, Producer,
          User Admin, Additional) using both DCT and Client packs to validate
          the upgrade process end-to-end before production deployment.
        user_stories:

          - title: "Policy - Dry Run - DCT Pack"
            description: >
              Execute the Policy dry run using the DCT deployment pack and
              record outcomes, issues, and timings.
            priority: 2

          - title: "Policy - Dry Run - Client Pack"
            description: >
              Execute the Policy dry run using the Client deployment pack and
              record outcomes, issues, and timings.
            priority: 2

          - title: "Policy/Producer - Dry Run - Client Pack"
            description: >
              Execute a combined Policy/Producer dry run using the Client
              deployment pack to validate cross-module behaviour.
            priority: 2

          - title: "Billing - Dry Run - DCT Pack"
            description: >
              Execute the Billing dry run using the DCT deployment pack and
              record outcomes, issues, and timings.
            priority: 2

          - title: "Billing - Dry Run - Client Pack"
            description: >
              Execute the Billing dry run using the Client deployment pack and
              record outcomes, issues, and timings.
            priority: 2

          - title: "Producer - Dry Run - DCT Pack"
            description: >
              Execute the Producer dry run using the DCT deployment pack and
              record outcomes, issues, and timings.
            priority: 2

          - title: "Producer - Dry Run - Client Pack"
            description: >
              Execute the Producer dry run using the Client deployment pack and
              record outcomes, issues, and timings.
            priority: 2

          - title: "User Admin - Dry Run - DCT Pack"
            description: >
              Execute the User Admin dry run using the DCT deployment pack and
              record outcomes, issues, and timings.
            priority: 2

          - title: "Additional - Dry Run - DCT Pack"
            description: >
              Execute the Additional components dry run using the DCT deployment
              pack and record outcomes, issues, and timings.
            priority: 2

      # ── Feature: Test and Triage ─────────────────────────────────────────────
      - title: "{client_name} {fiscal_year} Test and Triage"
        description: >
          Formal test and triage passes including structured test execution,
          defect identification, and defect fix cycles leading to production
          readiness sign-off.
        user_stories:

          - title: "{client_name} {fiscal_year} Test and Triage - Pass 1"
            description: >
              Execute the first formal test pass covering all in-scope modules
              and workflows, logging defects for triage.
            priority: 2

          - title: "{client_name} {fiscal_year} Test and Triage - Pass 1 - Defect Fixes"
            description: >
              Resolve defects identified during Test and Triage Pass 1 and
              re-validate affected areas before the next test pass.
            priority: 2

      # ── Feature: Deployment ──────────────────────────────────────────────────
      - title: "{client_name} {fiscal_year} - Deployment"
        description: >
          Production deployment activities including sprint code merge and
          hands-on deployment support to ensure a successful go-live.
        user_stories:

          - title: "{client_name} Sprint Merge"
            description: >
              Merge all sprint code changes into the release branch ready
              for production deployment.
            priority: 2

          - title: "Deployment Support"
            description: >
              Provide active support during the production deployment window,
              monitoring progress and resolving issues in real time.
            priority: 2

      # ── Feature: Client Regression ───────────────────────────────────────────
      - title: "{client_name} {fiscal_year} Client Regression"
        description: >
          Client regression testing following production deployment to confirm
          that no pre-existing functionality has been broken by the upgrade.
        user_stories:

          - title: "CR - Defect Fixing"
            description: >
              Investigate and fix defects raised by the client during the
              regression testing phase post-deployment.
            priority: 2

      # ── Feature: Handover & Support ──────────────────────────────────────────
      - title: "{client_name} {fiscal_year} Handover & Support"
        description: >
          Formal handover of the upgraded {client_name} environment to the client
          support team, including documentation, knowledge transfer, and
          early-life support.
        user_stories:

          - title: "Handover & Support"
            description: >
              Complete the formal handover process including knowledge transfer
              sessions, handover documentation, and early-life support coverage.
            priority: 2
